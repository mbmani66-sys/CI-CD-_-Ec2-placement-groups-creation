AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 using Spread Placement Group

Resources:

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH and HTTP
      VpcId:
        Fn::ImportValue: Placement-VPC

      SecurityGroupIngress:

        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:

      InstanceType: t3.small

      ImageId: ami-05ffe3c48a9991133

      KeyName: YOUR_KEYPAIR_NAME

      PlacementGroupName:
        Fn::ImportValue: PlacementGroupName

      NetworkInterfaces:

        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref SecurityGroup
          SubnetId:
            Fn::ImportValue: Placement-Subnet

      Tags:
        - Key: Name
          Value: PlacementGroupEC2

Outputs:

  InstanceId:
    Value: !Ref EC2Instance

  PublicIP:
    Value: !GetAtt EC2Instance.PublicIp
