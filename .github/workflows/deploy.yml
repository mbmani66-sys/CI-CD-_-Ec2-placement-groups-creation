name: Deploy Placement Group Infrastructure

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy VPC
        run: |
          aws cloudformation deploy \
            --template-file templates/vpc.yaml \
            --stack-name placement-vpc \
            --capabilities CAPABILITY_NAMED_IAM

      - name: Deploy Placement Group
        run: |
          aws cloudformation deploy \
            --template-file templates/placement-group.yaml \
            --stack-name placement-group \
            --capabilities CAPABILITY_NAMED_IAM

      - name: Deploy EC2
        run: |
          aws cloudformation deploy \
            --template-file templates/ec2.yaml \
            --stack-name placement-ec2 \
            --capabilities CAPABILITY_NAMED_IAM
